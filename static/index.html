<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uplarr - Local to SFTP Upload</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Uplarr</h1>
            <p>View local files and trigger SFTP upload.</p>
        </header>

        <section class="file-list-section">
            <div class="list-header">
                <h2>Local Files</h2>
                <button id="refresh-btn">Refresh List</button>
            </div>
            <div id="file-list-container">
                <table id="file-table">
                    <thead>
                        <tr>
                            <th>File Name</th>
                            <th>Size</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="file-list-body">
                        <!-- Files will be loaded here -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="config-section">
            <h2>SFTP Configuration</h2>
            <form id="sftp-form">
                <div class="form-group">
                    <label for="host">Host:</label>
                    <input type="text" id="host" name="host" placeholder="e.g. sftp.example.com" required>
                </div>
                <div class="form-group">
                    <label for="port">Port:</label>
                    <input type="number" id="port" name="port" value="22" required>
                </div>
                <div class="form-group">
                    <label for="user">Username:</label>
                    <input type="text" id="user" name="user" placeholder="user" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="leave blank if using key">
                </div>
                <div class="form-group">
                    <label for="key_path">Private Key Path (Server Local):</label>
                    <input type="text" id="key_path" name="key_path" placeholder="/path/to/key (optional)">
                </div>
                <div class="form-group">
                    <label for="remote_dir">Remote Directory:</label>
                    <input type="text" id="remote_dir" name="remote_dir" value="/upload" required>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="delete_after_verify" name="delete_after_verify">
                    <label for="delete_after_verify">Delete Local File After Verify</label>
                </div>
                <div class="form-group">
                    <label for="max_retries">Max Retries:</label>
                    <input type="number" id="max_retries" name="max_retries" value="3" required>
                </div>
            </form>
        </section>

        <section class="actions-section">
            <button id="upload-btn" class="primary-btn">Trigger SFTP Upload</button>
            <div id="status-message" class="status-msg hidden"></div>
        </section>

        <section class="logs-section">
            <h3>Progress Logs</h3>
            <div id="log-container" class="log-window"></div>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
