services:
  uplarr:
    image: ghcr.io/arumes31/uplarr:main
    container_name: uplarr
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - LOCAL_DIR=/data
      - WEB_PORT=8080
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
    volumes:
      # Note: This volume must be writable (:rw) for queue persistence to function.
      # The state is stored in .queue_state.json within this directory.
      - /path/to/your/local/files:/data
