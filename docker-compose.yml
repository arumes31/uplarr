services:
  uplarr:
    image: ghcr.io/arumes31/uplarr:main
    container_name: uplarr
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - LOCAL_DIR=/data
      - CONFIG_DIR=/config
      - WEB_PORT=8080
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
    volumes:
      # Application state (queue) is stored here. Must be writable.
      - ./config:/config
      # Your local files to be uploaded. Can be read-only.
      - /path/to/your/local/files:/data:ro
