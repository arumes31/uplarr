# .goreleaser.yaml
version: 2
project_name: uplarr

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/uplarr
    binary: uplarr


archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: arumes31
    name: uplarr

dockers:
  - image_templates:
      - "ghcr.io/arumes31/uplarr:{{ .Tag }}"
      - "ghcr.io/arumes31/uplarr:{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/arumes31/uplarr:{{ .Major }}"
      - "ghcr.io/arumes31/uplarr:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
    goos: linux
    goarch: amd64

  - image_templates:
      - "ghcr.io/arumes31/uplarr:{{ .Tag }}-arm64"
      - "ghcr.io/arumes31/uplarr:{{ .Major }}.{{ .Minor }}-arm64"
      - "ghcr.io/arumes31/uplarr:{{ .Major }}-arm64"
      - "ghcr.io/arumes31/uplarr:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/arumes31/uplarr:{{ .Tag }}"
    image_templates:
      - "ghcr.io/arumes31/uplarr:{{ .Tag }}"
      - "ghcr.io/arumes31/uplarr:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/arumes31/uplarr:latest"
    image_templates:
      - "ghcr.io/arumes31/uplarr:latest"
      - "ghcr.io/arumes31/uplarr:latest-arm64"
